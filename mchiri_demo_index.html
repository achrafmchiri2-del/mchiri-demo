<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCHIRI Engine V3</title>

<style>

body{
margin:0;
background:#050510;
color:white;
font-family:Arial,Helvetica,sans-serif;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

canvas{
background:#000014;
border:1px solid #333;
}

.controls{
margin-top:10px;
display:flex;
gap:10px;
}

input{
background:#111;
border:1px solid #555;
color:white;
padding:8px;
width:140px;
}

button{
padding:10px 16px;
background:#111;
color:white;
border:1px solid #555;
cursor:pointer;
}

</style>
</head>

<body>

<h2>MCHIRI Geometry Engine V3</h2>

<canvas id="c" width="600" height="600"></canvas>

<div class="controls">
<input id="seedInput" placeholder="Enter number seed">
<button onclick="generate()">Generate</button>
<button onclick="randomSeed()">Random</button>
</div>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let nodes = [];
let center = {x:canvas.width/2, y:canvas.height/2};
let t = 0;

function mapDigits(seed){

const digits = seed.toString().split("").map(d=>parseInt(d));

nodes = [];

digits.forEach((d,i)=>{

const angle = (d/10)*Math.PI*2;
const radius = 120 + i*40 + d*6;

const x = center.x + Math.cos(angle)*radius;
const y = center.y + Math.sin(angle)*radius;

nodes.push({
x,
y,
radius,
angle,
speed:0.002 + d*0.0005
});

});

}

function drawCore(){

ctx.beginPath();
ctx.arc(center.x,center.y,6,0,Math.PI*2);

let g = ctx.createRadialGradient(
center.x,center.y,1,
center.x,center.y,20
);

g.addColorStop(0,"#ffffff");
g.addColorStop(1,"rgba(0,255,255,0)");

ctx.fillStyle=g;
ctx.fill();

}

function drawOrbits(){

ctx.strokeStyle="rgba(0,255,255,0.1)";

nodes.forEach(n=>{

ctx.beginPath();
ctx.arc(center.x,center.y,n.radius,0,Math.PI*2);
ctx.stroke();

});

}

function drawConnections(){

ctx.strokeStyle="rgba(0,255,255,0.15)";

for(let i=0;i<nodes.length;i++){

for(let j=i+1;j<nodes.length;j++){

ctx.beginPath();
ctx.moveTo(nodes[i].x,nodes[i].y);
ctx.lineTo(nodes[j].x,nodes[j].y);
ctx.stroke();

}

}

}

function drawBridges(){

ctx.strokeStyle="rgba(0,255,255,0.25)";

nodes.forEach(n=>{

ctx.beginPath();
ctx.moveTo(center.x,center.y);
ctx.lineTo(n.x,n.y);
ctx.stroke();

});

}

function drawNodes(){

nodes.forEach(n=>{

ctx.beginPath();
ctx.arc(n.x,n.y,4,0,Math.PI*2);

let g = ctx.createRadialGradient(
n.x,n.y,1,
n.x,n.y,10
);

g.addColorStop(0,"#ffffff");
g.addColorStop(1,"rgba(0,255,255,0)");

ctx.fillStyle=g;
ctx.fill();

});

}

function update(){

nodes.forEach(n=>{

n.angle += n.speed;

n.x = center.x + Math.cos(n.angle)*n.radius;
n.y = center.y + Math.sin(n.angle)*n.radius;

});

}

function render(){

ctx.clearRect(0,0,canvas.width,canvas.height);

drawOrbits();
drawConnections();
drawBridges();
drawCore();
drawNodes();

update();

requestAnimationFrame(render);

}

function generate(){

let seed = document.getElementById("seedInput").value;

if(seed==="") seed = Math.floor(Math.random()*9999999);

mapDigits(seed);

}

function randomSeed(){

const r = Math.floor(Math.random()*9999999);

document.getElementById("seedInput").value = r;

generate();

}

generate();
render();

</script>

</body>
</html>
