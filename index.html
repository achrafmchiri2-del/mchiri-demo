<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MCHIRI Core Engine V5</title>
<style>
  :root{
    --bg:#02030a;
    --bg2:#060914;
    --text:#eef7ff;
    --muted:rgba(219,231,255,.60);
    --panel:rgba(8,11,25,.32);
    --border:rgba(255,255,255,.08);
    --glow:#7cecff;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    overflow:hidden;
    font-family:Inter,Arial,Helvetica,sans-serif;
    color:var(--text);
    background:
      radial-gradient(circle at 50% 42%, rgba(96,116,255,.13), transparent 18%),
      radial-gradient(circle at 18% 18%, rgba(0,255,255,.05), transparent 14%),
      radial-gradient(circle at 84% 14%, rgba(184,112,255,.06), transparent 15%),
      linear-gradient(180deg,#010207 0%,#030612 46%,#010207 100%);
  }
  .stars,.stars:before,.stars:after{
    content:"";
    position:fixed; inset:0;
    pointer-events:none;
    background-image:
      radial-gradient(circle at 12% 22%, rgba(255,255,255,.75) 0 1px, transparent 1.8px),
      radial-gradient(circle at 74% 18%, rgba(255,255,255,.55) 0 1px, transparent 1.8px),
      radial-gradient(circle at 87% 67%, rgba(255,255,255,.42) 0 1px, transparent 1.8px),
      radial-gradient(circle at 29% 79%, rgba(255,255,255,.32) 0 1px, transparent 1.8px),
      radial-gradient(circle at 58% 85%, rgba(255,255,255,.25) 0 1px, transparent 1.8px);
    opacity:.45;
  }
  .stars:before{transform:scale(1.45); opacity:.18}
  .stars:after{transform:scale(2.0); opacity:.08}

  .title{
    position:fixed;
    top:14px; left:50%;
    transform:translateX(-50%);
    z-index:9;
    text-align:center;
    pointer-events:none;
  }
  .title h1{
    margin:0;
    font-size:clamp(18px,3vw,30px);
    font-weight:650;
    letter-spacing:.14em;
  }
  .title p{
    margin:6px 0 0;
    font-size:11px;
    color:var(--muted);
    letter-spacing:.20em;
    text-transform:uppercase;
  }

  .controls{
    position:fixed;
    top:14px; left:14px;
    z-index:10;
    width:min(320px,calc(100vw - 28px));
    border:1px solid var(--border);
    background:var(--panel);
    backdrop-filter:blur(14px);
    border-radius:18px;
    box-shadow:0 16px 40px rgba(0,0,0,.28);
    overflow:hidden;
  }
  .controlsHead{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:11px 12px;
    border-bottom:1px solid rgba(255,255,255,.05);
  }
  .controlsHead .label{
    font-size:11px;
    color:var(--muted);
    letter-spacing:.18em;
    text-transform:uppercase;
  }
  .toggle{
    width:32px; height:32px;
    border-radius:10px;
    border:0;
    cursor:pointer;
    background:rgba(255,255,255,.06);
    color:var(--text);
    font-size:18px;
  }
  .controlsBody{
    padding:12px;
    display:grid;
    gap:10px;
  }
  .controlsBody.hidden{display:none}
  .seedRow{
    display:flex;
    gap:8px;
  }
  input[type=text]{
    flex:1;
    min-width:0;
    background:rgba(255,255,255,.05);
    color:var(--text);
    border:1px solid var(--border);
    border-radius:12px;
    padding:11px 12px;
    outline:none;
  }
  input[type=range]{width:132px}
  .mini{
    display:grid;
    grid-template-columns:1fr auto;
    gap:10px;
    align-items:center;
  }
  .mini label{
    color:var(--muted);
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
  }
  button{
    appearance:none;
    border:0;
    cursor:pointer;
    border-radius:12px;
    padding:11px 12px;
    font-weight:700;
  }
  .btnMain{
    background:linear-gradient(180deg,#a6f5ff,#63e8ff);
    color:#071018;
  }
  .btnGhost{
    background:rgba(255,255,255,.06);
    color:var(--text);
    border:1px solid var(--border);
  }

  .readout{
    position:fixed;
    right:14px; bottom:14px;
    z-index:9;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    justify-content:flex-end;
    max-width:min(500px,calc(100vw - 28px));
  }
  .pill{
    background:rgba(8,11,25,.40);
    border:1px solid var(--border);
    backdrop-filter:blur(10px);
    border-radius:999px;
    padding:9px 12px;
    color:var(--muted);
    font-size:11px;
    letter-spacing:.10em;
    text-transform:uppercase;
  }

  .stage{position:fixed; inset:0}
  canvas{display:block; width:100%; height:100%}

  @media (max-width:700px){
    .controls{width:calc(100vw - 24px); left:12px; top:12px}
    .readout{left:12px; right:12px; bottom:12px}
    .seedRow{flex-wrap:wrap}
    .seedRow button{flex:1}
  }
</style>
</head>
<body>
<div class="stars"></div>

<div class="title">
  <h1>MCHIRI</h1>
  <p>Core Engine V5 · Number to Geometry</p>
</div>

<div class="controls">
  <div class="controlsHead">
    <div class="label">Rule Engine</div>
    <button class="toggle" id="toggleBtn">−</button>
  </div>
  <div class="controlsBody" id="controlsBody">
    <div class="seedRow">
      <input id="seedInput" type="text" value="137246890" inputmode="numeric" placeholder="Numeric seed" />
      <button class="btnMain" id="genBtn">Generate</button>
      <button class="btnGhost" id="randBtn">Random</button>
    </div>
    <div class="mini">
      <label>Life</label>
      <input id="lifeInput" type="range" min="0" max="100" value="34" />
    </div>
    <div class="mini">
      <label>Gravity</label>
      <input id="gravityInput" type="range" min="0" max="100" value="42" />
    </div>
    <div class="mini">
      <label>Bridges</label>
      <input id="bridgeInput" type="range" min="20" max="100" value="54" />
    </div>
    <div class="mini">
      <label>Glow</label>
      <input id="glowInput" type="range" min="20" max="100" value="68" />
    </div>
  </div>
</div>

<div class="readout">
  <div class="pill" id="seedTag">Seed 137246890</div>
  <div class="pill" id="ruleTag">Rule Mixed Structure</div>
  <div class="pill" id="countTag">Nodes 0</div>
</div>

<div class="stage"><canvas id="c"></canvas></div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

const seedInput = document.getElementById("seedInput");
const lifeInput = document.getElementById("lifeInput");
const gravityInput = document.getElementById("gravityInput");
const bridgeInput = document.getElementById("bridgeInput");
const glowInput = document.getElementById("glowInput");
const genBtn = document.getElementById("genBtn");
const randBtn = document.getElementById("randBtn");
const toggleBtn = document.getElementById("toggleBtn");
const controlsBody = document.getElementById("controlsBody");
const seedTag = document.getElementById("seedTag");
const ruleTag = document.getElementById("ruleTag");
const countTag = document.getElementById("countTag");

let DPR = Math.min(window.devicePixelRatio || 1, 2);
let W=0,H=0,CX=0,CY=0;

let state = {
  seed:"137246890",
  nodes:[],
  life:.34,
  gravity:.42,
  bridges:.54,
  glow:.68,
  mode:"Mixed Structure"
};

function resize(){
  W = Math.floor(innerWidth * DPR);
  H = Math.floor(innerHeight * DPR);
  canvas.width = W;
  canvas.height = H;
  CX = W/2;
  CY = H/2;
}
addEventListener("resize", resize);
resize();

function hashSeed(str){
  let h = 2166136261;
  for(let i=0;i<str.length;i++){
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}
function rngFactory(seed){
  let s = hashSeed(seed) || 123456789;
  return function(){
    s ^= s << 13;
    s ^= s >>> 17;
    s ^= s << 5;
    return (s >>> 0) / 4294967295;
  };
}
function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }

function addNode(arr, angle, radius, group, size, digit, speed){
  arr.push({
    baseAngle:angle,
    radius:radius,
    group:group,
    size:size,
    digit:digit,
    speed:speed,
    pulse:.4 + Math.random()*1.7,
    drift:(Math.random()-.5)*.9
  });
}

function buildSeedStructure(seed){
  const clean = (seed || "").replace(/\D/g,"") || "137246890";
  const digits = clean.split("").map(Number);
  const rng = rngFactory(clean);
  const nodes = [];
  let group = 0;
  const unit = Math.min(W,H) * 0.038;

  for(let i=0;i<digits.length;i++){
    const d = digits[i];
    if(d === 0){
      addNode(nodes, 0, 0, group++, 3.7, d, 0);
      continue;
    }

    if(d === 1){
      addNode(nodes, 0, unit*0.8, group++, 2.5, d, .3);
      continue;
    }

    if(d === 2){
      for(let k=0;k<2;k++){
        const a = k*Math.PI + i*0.12;
        addNode(nodes, a, unit*1.25, group, 2.2, d, .45);
      }
      group++;
      continue;
    }

    const count = d;
    const radius = unit * (1.2 + i*0.34);
    const rotation = i*0.32 + (rng()-.5)*0.35;
    for(let k=0;k<count;k++){
      const a = rotation + (k/count)*Math.PI*2;
      addNode(nodes, a, radius, group, 1.8 + d*0.1, d, .25 + rng()*1.2);
    }

    if(d === 7 || d === 8 || d === 9){
      const orbitCount = d - 5;
      for(let k=0;k<orbitCount;k++){
        const a = rotation + (k/orbitCount)*Math.PI*2 + Math.PI/orbitCount;
        addNode(nodes, a, radius*1.34, group+1, 1.6 + d*0.06, d, .22 + rng()*1.1);
      }
      group += 2;
    } else {
      group++;
    }
  }

  if(nodes.length < 10){
    for(let i=0;i<10;i++){
      const a = (i/10)*Math.PI*2;
      addNode(nodes, a, unit*3.2, 99, 2, 9, .4);
    }
  }

  return { clean, digits, nodes };
}

function rebuild(){
  const built = buildSeedStructure(seedInput.value);
  state.seed = built.clean;
  state.nodes = built.nodes;
  state.life = (+lifeInput.value || 34)/100;
  state.gravity = (+gravityInput.value || 42)/100;
  state.bridges = (+bridgeInput.value || 54)/100;
  state.glow = (+glowInput.value || 68)/100;

  const uniqueDigits = [...new Set(built.digits)];
  state.mode = uniqueDigits.length > 6 ? "Dense Hybrid Language" :
               uniqueDigits.includes(0) ? "Axis Core Structure" :
               uniqueDigits.includes(7) || uniqueDigits.includes(8) || uniqueDigits.includes(9) ? "Orbital Rule Structure" :
               "Polygon Rule Structure";

  seedTag.textContent = "Seed " + state.seed;
  ruleTag.textContent = "Rule " + state.mode;
  countTag.textContent = "Nodes " + state.nodes.length;
}

function pointAt(n, t){
  const life = state.life;
  const grav = state.gravity;
  const pulse = 1 + Math.sin(t*0.001*n.pulse + n.baseAngle*2 + n.drift) * (0.03 + life*0.08);
  const orbit = Math.sin(t*0.0011*n.speed + n.baseAngle + n.digit) * (14*life*DPR);
  const gravPull = grav * Math.sin(t*0.0007 + n.group*1.1 + n.digit) * 10 * DPR;
  const angle = n.baseAngle + t*0.00015*n.speed*life + orbit/1000;
  const radius = Math.max(0, n.radius * pulse - gravPull);
  return {
    x: CX + Math.cos(angle)*radius,
    y: CY + Math.sin(angle)*radius,
    size: n.size * DPR,
    group: n.group,
    digit: n.digit
  };
}

function glowCircle(x,y,r,stops){
  const g = ctx.createRadialGradient(x,y,0,x,y,r);
  for(const s of stops) g.addColorStop(s[0], s[1]);
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fill();
}

function drawBackground(){
  glowCircle(CX, CY, Math.min(W,H)*0.46, [
    [0, "rgba(114,238,255,0.06)"],
    [.28, "rgba(95,119,255,0.045)"],
    [1, "rgba(0,0,0,0)"]
  ]);

  for(let i=0;i<5;i++){
    ctx.strokeStyle = "rgba(255,255,255,0.028)";
    ctx.lineWidth = 1 * DPR;
    ctx.beginPath();
    ctx.arc(CX, CY, Math.min(W,H)*(0.06 + i*0.055), 0, Math.PI*2);
    ctx.stroke();
  }
}

function render(t){
  ctx.clearRect(0,0,W,H);
  drawBackground();

  const pts = state.nodes.map(n => pointAt(n, t));
  const maxDist = Math.min(W,H) * (0.08 + state.bridges*0.18);

  for(let i=0;i<pts.length;i++){
    for(let j=i+1;j<pts.length;j++){
      const dx = pts[i].x - pts[j].x;
      const dy = pts[i].y - pts[j].y;
      const dist = Math.hypot(dx,dy);

      if(dist < maxDist){
        const sameGroup = pts[i].group === pts[j].group;
        const sameDigit = pts[i].digit === pts[j].digit;
        const alpha = (1 - dist/maxDist) * (sameGroup ? 0.18 : sameDigit ? 0.12 : 0.07);

        ctx.strokeStyle = sameGroup
          ? `rgba(125,238,255,${alpha})`
          : sameDigit
          ? `rgba(190,150,255,${alpha})`
          : `rgba(120,160,255,${alpha})`;

        ctx.lineWidth = (sameGroup ? 1.05 : 0.72) * DPR;
        ctx.beginPath();
        ctx.moveTo(pts[i].x, pts[i].y);
        ctx.lineTo(pts[j].x, pts[j].y);
        ctx.stroke();
      }
    }
  }

  ctx.strokeStyle = "rgba(135,170,255,0.10)";
  ctx.lineWidth = 0.75 * DPR;
  pts.forEach(p=>{
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
  });

  for(let i=0;i<pts.length;i+=3){
    const a = pts[i];
    const b = pts[(i + Math.floor(pts.length/4)) % pts.length];
    ctx.strokeStyle = "rgba(189,150,255,0.05)";
    ctx.lineWidth = 0.8 * DPR;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.quadraticCurveTo(CX, CY, b.x, b.y);
    ctx.stroke();
  }

  glowCircle(CX, CY, 28*DPR, [
    [0, "rgba(244,253,255,0.98)"],
    [.34, "rgba(125,238,255,0.28)"],
    [1, "rgba(125,238,255,0)"]
  ]);

  const glowBoost = 3.5 + state.glow*3.2;
  pts.forEach(p=>{
    glowCircle(p.x, p.y, p.size*glowBoost, [
      [0, "rgba(244,253,255,0.92)"],
      [.34, "rgba(125,238,255,0.34)"],
      [1, "rgba(125,238,255,0)"]
    ]);
    ctx.fillStyle = "rgba(244,253,255,0.98)";
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
  });

  requestAnimationFrame(render);
}

toggleBtn.onclick = ()=>{
  controlsBody.classList.toggle("hidden");
  toggleBtn.textContent = controlsBody.classList.contains("hidden") ? "+" : "−";
};

genBtn.onclick = rebuild;
randBtn.onclick = ()=>{
  let s = "";
  const len = 5 + Math.floor(Math.random()*6);
  for(let i=0;i<len;i++) s += Math.floor(Math.random()*10);
  seedInput.value = s;
  rebuild();
};

seedInput.addEventListener("keydown", e=>{ if(e.key === "Enter") rebuild(); });
lifeInput.oninput = rebuild;
gravityInput.oninput = rebuild;
bridgeInput.oninput = rebuild;
glowInput.oninput = rebuild;

rebuild();
requestAnimationFrame(render);
</script>
</body>
</html>
